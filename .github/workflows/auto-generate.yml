name: Ensure 20 Daily Commits

on:
  workflow_dispatch:

  # Beberapa kesempatan pemicu dalam sehari.
  # Satu run yang berhasil sudah cukup untuk mengisi sampai 20 commit.
  schedule:
    - cron: "17 0,3,6,9,12,15,18,21 * * *"
      timezone: "Asia/Jakarta"

permissions:
  contents: write

concurrency:
  group: ensure-20-daily-commits-main
  cancel-in-progress: false

env:
  TARGET_BRANCH: main
  TARGET_COMMITS: "20"
  TIMEZONE: Asia/Jakarta

jobs:
  ensure-daily-commits:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail

          git pull --rebase origin "$TARGET_BRANCH"

      - name: Create missing daily commits
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "faw1es"
          git config user.email "faiqbw12@gmail.com"

          # Tanggal berdasarkan WIB.
          day=$(TZ="$TIMEZONE" date +'%Y-%m-%d')

          # Folder marker untuk mengetahui jumlah commit otomatis hari ini.
          marker_dir=".daily-commits/${day}"
          mkdir -p "$marker_dir"

          existing=$(
            find "$marker_dir" \
              -maxdepth 1 \
              -type f \
              -name '*.done' |
            wc -l |
            tr -d ' '
          )

          echo "Tanggal            : $day"
          echo "Commit otomatis ada: $existing"
          echo "Target commit       : $TARGET_COMMITS"

          if [ "$existing" -ge "$TARGET_COMMITS" ]; then
            echo "Target 20 commit hari ini sudah tercapai."
            exit 0
          fi

          for i in $(seq 1 "$TARGET_COMMITS"); do
            sequence=$(printf '%02d' "$i")
            marker="${marker_dir}/${sequence}.done"

            # Lewati nomor commit yang sudah dibuat.
            if [ -f "$marker" ]; then
              continue
            fi

            random_number=$(
              shuf -i 100000000-999999999 -n 1
            )

            folder="generated/${day}/${sequence}-${random_number}"
            mkdir -p "$folder"

            cat > "$folder/main.go" <<EOF
          package main

          import "fmt"

          const generatedID = "${GITHUB_RUN_ID}-${sequence}"

          func calculateTip(tagihan float64) (float64, float64) {
              var tipRate float64

              if tagihan >= 50 && tagihan <= 300 {
                  tipRate = 0.15
              } else {
                  tipRate = 0.20
              }

              tip := tagihan * tipRate
              total := tagihan + tip

              return tip, total
          }

          func main() {
              tagihan := 200.0

              tip, total := calculateTip(tagihan)

              fmt.Printf(
                  "ID: %s\nTagihan: Rp. %.2f\nTip: Rp. %.2f\nTotal: Rp. %.2f\n",
                  generatedID,
                  tagihan,
                  tip,
                  total,
              )
          }
          EOF

            printf '%s\n' \
              "Generated commit ${sequence}/${TARGET_COMMITS}" \
              "Date: ${day}" \
              "Run ID: ${GITHUB_RUN_ID}" \
              > "$marker"

            git add \
              "$folder/main.go" \
              "$marker"

            commit_time=$(
              TZ="$TIMEZONE" date --iso-8601=seconds
            )

            GIT_AUTHOR_DATE="$commit_time" \
            GIT_COMMITTER_DATE="$commit_time" \
              git commit -m \
                "chore: daily generated item ${sequence}/${TARGET_COMMITS} (${day})"

            echo "Created commit ${sequence}/${TARGET_COMMITS}"
          done

      - name: Push commits to main
        shell: bash
        run: |
          set -euo pipefail

          # Antisipasi perubahan lain di main saat workflow berjalan.
          git pull --rebase origin "$TARGET_BRANCH"

          git push origin "HEAD:${TARGET_BRANCH}"
