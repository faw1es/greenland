name: Auto Generate and Push

on:
  workflow_dispatch:

  schedule:
    # Berjalan setiap jam 01.00–20.00 UTC
    - cron: "0 1-20 * * *"

permissions:
  contents: write

concurrency:
  group: auto-generate-push
  cancel-in-progress: false

env:
  TARGET_BRANCH: maintenance-sync

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare target branch
        shell: bash
        run: |
          git fetch origin "$TARGET_BRANCH" || true

          if git show-ref --verify --quiet \
            "refs/remotes/origin/$TARGET_BRANCH"; then

            git switch -C "$TARGET_BRANCH" \
              "origin/$TARGET_BRANCH"
          else
            git switch -c "$TARGET_BRANCH"
          fi

      - name: Create random Go project
        shell: bash
        run: |
          random_number=$(shuf -i 100000000-999999999 -n 1)
          folder="generated/${random_number}"

          mkdir -p "$folder"

          cat > "$folder/main.go" <<'EOF'
          package main

          import (
              "fmt"
              "os"
          )

          func calculateTip(tagihan float64) (float64, float64) {
              var tipRate float64

              if tagihan >= 50 && tagihan <= 300 {
                  tipRate = 0.15
              } else {
                  tipRate = 0.20
              }

              tip := tagihan * tipRate
              total := tagihan + tip

              return tip, total
          }

          func main() {
              var tagihan float64

              fmt.Print("Masukkan nilai tagihan: ")
              fmt.Scan(&tagihan)

              tip, total := calculateTip(tagihan)

              outputText := fmt.Sprintf(
                  "Tagihannya: Rp. %.2f\nTipnya: Rp. %.2f\nTotal nilainya: Rp. %.2f\n",
                  tagihan,
                  tip,
                  total,
              )

              err := os.WriteFile(
                  "output.txt",
                  []byte(outputText),
                  0644,
              )

              if err != nil {
                  fmt.Println("Error:", err)
                  return
              }

              fmt.Println(
                  "Output telah ditulis ke output.txt",
              )
          }
          EOF

          echo "Created: $folder/main.go"

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "faw1es"
          git config user.email \
            "faiqbw12@gmail.com"

          git add generated/

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
            exit 0
          fi

          git commit -m \
            "chore: scheduled maintenance $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          git push -u origin "$TARGET_BRANCH"
