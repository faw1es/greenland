name: Auto Generate and Push

on:
  # Bisa dijalankan manual dari tab Actions
  workflow_dispatch:

  # Otomatis 20 kali sehari:
  # 04.37 sampai 23.37 WITA
  schedule:
    - cron: "17,32,47 20-23,0-15 * * *"
      timezone: "Asia/Makassar"

permissions:
  contents: write

concurrency:
  group: auto-generate-push-main
  cancel-in-progress: false

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Create random Go project
        shell: bash
        run: |
          set -euo pipefail

          random_number=$(shuf -i 100000000-999999999 -n 1)

          # GITHUB_RUN_ID membuat nama folder tetap unik
          folder="generated/${random_number}-${GITHUB_RUN_ID}"

          mkdir -p "$folder"

          cat > "$folder/main.go" <<'EOF'
          package main

          import (
              "fmt"
              "os"
          )

          func calculateTip(tagihan float64) (float64, float64) {
              var tipRate float64

              if tagihan >= 50 && tagihan <= 300 {
                  tipRate = 0.15
              } else {
                  tipRate = 0.20
              }

              tip := tagihan * tipRate
              total := tagihan + tip

              return tip, total
          }

          func main() {
              var tagihan float64

              fmt.Print("Masukkan nilai tagihan: ")
              fmt.Scan(&tagihan)

              tip, total := calculateTip(tagihan)

              outputText := fmt.Sprintf(
                  "Tagihannya: Rp. %.2f\nTipnya: Rp. %.2f\nTotal nilainya: Rp. %.2f\n",
                  tagihan,
                  tip,
                  total,
              )

              err := os.WriteFile(
                  "output.txt",
                  []byte(outputText),
                  0644,
              )

              if err != nil {
                  fmt.Println("Error:", err)
                  return
              }

              fmt.Println("Output telah ditulis ke output.txt")
          }
          EOF

          echo "Created: $folder/main.go"

      - name: Commit and push to main
        shell: bash
        env:
          TARGET_BRANCH: main
        run: |
          set -euo pipefail

          git config user.name "faw1es"
          git config user.email "faiqbw12@gmail.com"

          git add -- generated/

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
            exit 0
          fi

          commit_time=$(TZ=Asia/Makassar date +'%Y-%m-%d %H:%M:%S WITA')

          git commit -m "chore: scheduled maintenance ${commit_time}"

          # Ambil perubahan terbaru jika main berubah
          # ketika workflow sedang berjalan
          git pull --rebase origin "$TARGET_BRANCH"

          git push origin "HEAD:${TARGET_BRANCH}"
