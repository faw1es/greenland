name: Auto Generate and Push

on:
  workflow_dispatch:

  schedule:
    # Tiga percobaan per jam, selama jam 01–20 UTC.
    # Maksimal tetap satu commit untuk setiap jam.
    - cron: "17,32,47 1-20 * * *"

permissions:
  contents: write

concurrency:
  group: auto-generate-push-main
  cancel-in-progress: false

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin main

      - name: Check hourly slot
        id: slot
        shell: bash
        run: |
          set -euo pipefail

          # Satu slot untuk setiap jam dalam UTC.
          slot_id=$(date -u +'%Y-%m-%d-%H')
          marker=".scheduler/${slot_id}.done"

          echo "slot_id=$slot_id" >> "$GITHUB_OUTPUT"
          echo "marker=$marker" >> "$GITHUB_OUTPUT"

          if [ -f "$marker" ]; then
            echo "Sudah ada commit untuk slot $slot_id."
            echo "should_generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "Belum ada commit untuk slot $slot_id."
            echo "should_generate=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create random Go project
        if: steps.slot.outputs.should_generate == 'true'
        shell: bash
        run: |
          set -euo pipefail

          random_number=$(shuf -i 100000000-999999999 -n 1)
          folder="generated/${random_number}-${GITHUB_RUN_ID}"

          mkdir -p "$folder"

          cat > "$folder/main.go" <<'EOF'
          package main

          import (
              "fmt"
              "os"
          )

          func calculateTip(tagihan float64) (float64, float64) {
              var tipRate float64

              if tagihan >= 50 && tagihan <= 300 {
                  tipRate = 0.15
              } else {
                  tipRate = 0.20
              }

              tip := tagihan * tipRate
              total := tagihan + tip

              return tip, total
          }

          func main() {
              var tagihan float64

              fmt.Print("Masukkan nilai tagihan: ")
              fmt.Scan(&tagihan)

              tip, total := calculateTip(tagihan)

              outputText := fmt.Sprintf(
                  "Tagihannya: Rp. %.2f\nTipnya: Rp. %.2f\nTotal nilainya: Rp. %.2f\n",
                  tagihan,
                  tip,
                  total,
              )

              err := os.WriteFile(
                  "output.txt",
                  []byte(outputText),
                  0644,
              )

              if err != nil {
                  fmt.Println("Error:", err)
                  return
              }

              fmt.Println("Output telah ditulis ke output.txt")
          }
          EOF

          marker="${{ steps.slot.outputs.marker }}"

          mkdir -p "$(dirname "$marker")"
          printf '%s\n' \
            "Created by GitHub Actions run ${GITHUB_RUN_ID}" \
            > "$marker"

          echo "Created: $folder/main.go"
          echo "Created marker: $marker"

      - name: Commit and push changes
        if: steps.slot.outputs.should_generate == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "faw1es"
          git config user.email "faiqbw12@gmail.com"

          git add generated/ .scheduler/

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan untuk di-commit."
            exit 0
          fi

          commit_time=$(date -u +'%Y-%m-%d %H:%M:%S UTC')

          git commit -m "chore: scheduled maintenance ${commit_time}"

          # Antisipasi branch main berubah selama workflow berjalan.
          git pull --rebase origin main
          git push origin HEAD:main
